{% extends "base.html" %}
{% block title %}{{ 'Editar' if action=='editar' else 'Novo' }} Funcionário{% endblock %}
{% block page_title %}{{ 'Editar' if action=='editar' else 'Novo' }} Funcionário{% endblock %}
{% block content %}
<div class="form-card">
  <form method="post">
    <div class="form-row">
      <div class="form-group">
        <label>Nome *</label>
        <input name="nome" value="{{ funcionario.get('nome','') }}" required placeholder="Nome completo">
      </div>
      <div class="form-group">
        <label>Cargo *</label>
        <select name="cargo" required>
          <option value="">Selecione...</option>
          {% for cargo in ['Banhista','Tosadora','Veterinário(a)','Recepcionista','Gerente','Outro'] %}
          <option value="{{ cargo }}" {{ 'selected' if funcionario.get('cargo')==cargo }}>{{ cargo }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Telefone</label>
        <input name="telefone" value="{{ funcionario.get('telefone','') }}" placeholder="(11) 99999-9999">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input name="email" type="email" value="{{ funcionario.get('email','') }}" placeholder="email@exemplo.com">
      </div>
    </div>
    {% if action == 'editar' %}
    <div class="form-group">
      <div class="checkbox-row">
        <input name="ativo" type="checkbox" id="ativo" {{ 'checked' if funcionario.get('ativo') }}>
        <label for="ativo" style="margin:0">Funcionário ativo</label>
      </div>
    </div>
    {% endif %}
    <div class="form-actions">
      <button class="btn btn-primary">💾 Salvar</button>
      <a href="{{ url_for('funcionarios') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
