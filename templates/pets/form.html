{% extends "base.html" %}
{% block title %}{{ 'Editar' if action=='editar' else 'Novo' }} Pet{% endblock %}
{% block page_title %}{{ 'Editar' if action=='editar' else 'Novo' }} Pet{% endblock %}
{% block content %}
<div class="form-card">
  <form method="post">
    <div class="form-row">
      <div class="form-group">
        <label>Nome do Pet *</label>
        <input name="nome" value="{{ pet.get('nome','') }}" required placeholder="Ex: Rex">
      </div>
      <div class="form-group">
        <label>Espécie *</label>
        <select name="especie" required>
          <option value="">Selecione...</option>
          {% for esp in ['Cachorro','Gato','Pássaro','Coelho','Hamster','Outro'] %}
          <option value="{{ esp }}" {{ 'selected' if pet.get('especie')==esp }}>{{ esp }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Raça</label>
        <input name="raca" value="{{ pet.get('raca','') }}" placeholder="Ex: Labrador">
      </div>
      <div class="form-group">
        <label>Dono *</label>
        <select name="cliente_id" required>
          <option value="">Selecione o cliente...</option>
          {% for c in clientes %}
          <option value="{{ c.id }}" {{ 'selected' if pet.get('cliente_id')|string == c.id|string }}>{{ c.nome }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Idade (anos)</label>
        <input name="idade" type="number" min="0" max="30" value="{{ pet.get('idade','') }}" placeholder="Ex: 3">
      </div>
      <div class="form-group">
        <label>Peso (kg)</label>
        <input name="peso" type="number" step="0.1" min="0" value="{{ pet.get('peso','') }}" placeholder="Ex: 8.5">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary">💾 Salvar</button>
      <a href="{{ url_for('pets') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
