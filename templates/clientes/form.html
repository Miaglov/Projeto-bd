{% extends "base.html" %}
{% block title %}{{ 'Editar' if action=='editar' else 'Novo' }} Cliente{% endblock %}
{% block page_title %}{{ 'Editar' if action=='editar' else 'Novo' }} Cliente{% endblock %}
{% block content %}
<div class="form-card">
  <form method="post">
    <div class="form-row">
      <div class="form-group">
        <label>Nome *</label>
        <input name="nome" value="{{ cliente.get('nome','') }}" required placeholder="Nome completo">
      </div>
      <div class="form-group">
        <label>CPF</label>
        <input name="cpf" value="{{ cliente.get('cpf','') }}" placeholder="000.000.000-00">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Telefone *</label>
        <input name="telefone" value="{{ cliente.get('telefone','') }}" required placeholder="(11) 99999-9999">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input name="email" type="email" value="{{ cliente.get('email','') }}" placeholder="email@exemplo.com">
      </div>
    </div>
    <div class="form-group">
      <label>Endereço</label>
      <input name="endereco" value="{{ cliente.get('endereco','') }}" placeholder="Rua, número, bairro">
    </div>
    <div class="form-actions">
      <button class="btn btn-primary">💾 Salvar</button>
      <a href="{{ url_for('clientes') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
