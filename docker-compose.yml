services:
  db:
    image: mysql:8.0
    container_name: petshop_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: petshop123
      MYSQL_DATABASE: petshop_db
    ports:
      - "3306:3306"
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppetshop123"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: petshop_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: petshop123
      DB_NAME: petshop_db
      SECRET_KEY: petshop_docker_secret_2025
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: